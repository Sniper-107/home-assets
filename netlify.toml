[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data: https://api.anthropic.com https://api.cloudinary.com https://res.cloudinary.com https://cdnjs.cloudflare.com https://fonts.googleapis.com https://fonts.gstatic.com"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
